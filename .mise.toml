[tools]
swiftlint = "latest"
swiftformat = "latest"

[tasks.fmt]
description = "Format Swift source files"
run = "swiftformat Sources Tests"

[tasks.lint]
description = "Lint Swift source files"
run = "swiftlint lint Sources Tests"

[tasks.test]
description = "Run tests"
run = "swift test"

[tasks.build]
description = "Build and bundle the app"
run = "sh build.sh"
